name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    name: Build and Verify CLI & WebUI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            cli/package-lock.json
            web/package-lock.json

      - name: Install & Build Backend (cli)
        run: |
          cd cli
          npm ci
          npm run build

      - name: Install & Build Frontend (web)
        run: |
          cd web
          npm ci
          npm run build
